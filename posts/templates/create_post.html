{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X | Create Post</title>
    <link rel="stylesheet" href="{% static 'css/create_post.css' %}">
    <link rel="icon" href="{% static 'images/x-favicon.png' %}">
</head>
<body>

<div class="page-overlay">

    <div class="modal-box">

        <div class="modal-header">
            <h3>Create Post</h3>
            <a href="{% url 'home:homepage' %}" class="close-btn">✕</a>
        </div>

        <form method="POST" enctype="multipart/form-data" id="post-form">
            {% csrf_token %}

            <textarea name="content" placeholder="What is happening?"></textarea>

<div class="media-box">

    <button type="button" onclick="chooseImage()">📷 Image</button>
    <button type="button" onclick="chooseVideo()">🎥 Video</button>

    <input type="file" id="imageInput" name="image" accept="image/*" hidden>
    <input type="file" id="videoInput" name="video" accept="video/*" hidden>

<div id="previewBox" style="display:none;">
    <button type="button" onclick="removeMedia()">✕</button>

    <img id="imgPreview" style="max-width:100%;">
    <video id="vidPreview" controls style="max-width:100%;"></video>
</div>

</div>

            <button type="submit" class="post-submit-btn">Post</button>
        </form>

    </div>

</div>
<script>

const imageInput = document.getElementById("imageInput");
const videoInput = document.getElementById("videoInput");

const previewBox = document.getElementById("previewBox");
const imgPreview = document.getElementById("imgPreview");
const vidPreview = document.getElementById("vidPreview");

function chooseImage() {
    videoInput.value = ""; 
    imageInput.click();
}

function chooseVideo() {
    imageInput.value = ""; 
    videoInput.click();
}


imageInput.addEventListener("change", () => {
    const file = imageInput.files[0];
    if (!file) return;

    imgPreview.src = URL.createObjectURL(file);
    imgPreview.style.display = "block";
    vidPreview.style.display = "none";

    previewBox.style.display = "block";
});


videoInput.addEventListener("change", () => {
    const file = videoInput.files[0];
    if (!file) return;

    vidPreview.src = URL.createObjectURL(file);
    vidPreview.style.display = "block";
    imgPreview.style.display = "none";

    previewBox.style.display = "block";
});
function removeMedia() {
    imageInput.value = "";
    videoInput.value = "";

    
    imgPreview.src = "";
    vidPreview.src = "";

    imgPreview.style.display = "none";
    vidPreview.style.display = "none";
    previewBox.style.display = "none";
}
document.getElementById("post-form").addEventListener("submit", function (e) {
    const content = document.querySelector("textarea[name='content']").value.trim();
    const hasImage = imageInput.files.length > 0;
    const hasVideo = videoInput.files.length > 0;

    if (!content && !hasImage && !hasVideo) {
        e.preventDefault();
        alert("Write something or attach an image/video before posting.");
    }
});
</script>
</body>
</html>
