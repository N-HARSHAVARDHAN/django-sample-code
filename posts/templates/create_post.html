{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X | Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/create_post.css' %}">
    <link rel="icon" href="{% static 'images/x-favicon.png' %}">
</head>
<body>

<div class="page-overlay">

    <div class="modal-box">

        <div class="modal-header">
            <h3>Create Post</h3>
            <a href="{% url 'home:homepage' %}" class="close-btn">✕</a>
        </div>

        <form method="POST" enctype="multipart/form-data" id="post-form">
            {% csrf_token %}

            <textarea name="content" placeholder="What is happening?"></textarea>

<div class="media-box">

    <button type="button" onclick="chooseImage()">📷 Image</button>
    <button type="button" onclick="chooseVideo()">🎥 Video</button>

    <input type="file" id="imageInput" name="image" accept="image/*" hidden>
    <input type="file" id="videoInput" name="video" accept="video/*" hidden>

<div id="previewBox" style="display:none;">
    <button type="button" onclick="removeMedia()">✕</button>

    <img id="imgPreview" style="max-width:100%;">
    <video id="vidPreview" controls style="max-width:100%;"></video>
</div>

</div>

            <button type="submit" class="post-submit-btn">Post</button>
        </form>

    </div>

</div>
<script src="{% static 'scripts/createPost.js' %}"></script>
</body>
</html>
